name: Update Production Data

on:
  schedule:
    # Runs every Monday and Thursday at 06:00 UTC
    # DA&FW publishes estimates a few times per year;
    # twice-weekly is frequent enough to catch new releases promptly
    - cron: '0 6 * * 1,4'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pdfplumber requests beautifulsoup4

      - name: Run extraction script
        run: python scripts/extract_production.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update production data — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
